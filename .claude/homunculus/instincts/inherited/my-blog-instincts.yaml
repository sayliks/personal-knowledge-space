# My Blog Workflow Data Model Migration Workflow

## Action

Follow the data-model-migration-workflow workflow:
1. Update the Prisma schema to define new/updated models and relationships.
2. Write migration scripts to transform existing data to the new model structure.
3. Refactor backend query logic to use the new models.
4. Update server actions to use the new models and fields.
5. Update API routes to reflect the new data model.
6. Update admin UI pages to use new field names and relationships.
7. Update user-facing pages/components to use new model references.
8. Add or update documentation/runbooks for the migration process.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: prisma/schema.prisma, prisma/migrate-to-*.ts, prisma/drop-old-tables.ts

